name: cron

on:
  schedule:
    - cron: '0,30 * * * *'
  workflow_dispatch:

concurrency:
  group: cron-deploy-v2
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  deploy-v2:
    name: Deploy scraper ^5.0
    runs-on: ubuntu-24.04

    steps:
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'

      - name: Checkout Code
        uses: actions/checkout@v6.0.2

      - name: Install base dependencies (without scraper)
        run: |
          composer remove bvp/scraper --no-update || true
          composer install --no-interaction --no-progress

      - name: Require scraper version ^5.0
        run: composer require bvp/scraper:^5.0 --no-update

      - name: Update lock file for scraper
        run: composer update bvp/scraper --with-dependencies

      - name: Final install
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Scrape Data (v2)
        run: php scraper.php v2

      - name: Deploy JSON for scraper v2
        run: |
          set -e
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          FILES=$(
            {
              git ls-files -m -- 'docs/v2' | grep '\.json$' || true
              git diff --cached --name-only --diff-filter=AM -- 'docs/v2' | grep '\.json$' || true
              git ls-files --others --exclude-standard -- 'docs/v2' | grep '\.json$' || true
            } | sort -u
          )
          if [ -n "$FILES" ]; then
            git add $FILES
            git commit -m "chore: deploy JSON files to docs/v2 [skip ci]" || true
            git pull --rebase --autostash
            git push origin HEAD
          else
            echo "No JSON changes in docs/v2 to commit."
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
