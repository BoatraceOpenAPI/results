name: cron

on:
  schedule:
    - cron: '30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        scraper-version: ['^4.0', '^5.0']
    concurrency:
      group: deploy-${{ matrix.scraper-version }}
      cancel-in-progress: false

    steps:
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install base dependencies (without scraper)
        run: |
          composer remove bvp/boatrace-scraper --no-update || true
          composer install --no-interaction --no-progress

      - name: Require scraper version ${{ matrix.scraper-version }}
        run: composer require bvp/boatrace-scraper:${{ matrix.scraper-version }} --no-update

      - name: Update lock file for scraper
        run: composer update bvp/boatrace-scraper --with-dependencies

      - name: Final install
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Scrape Data (v1 for ^4.0)
        if: matrix.scraper-version == '^4.0'
        run: php scraper_v1.php

      - name: Deploy JSON for scraper v1
        if: matrix.scraper-version == '^4.0'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          FILES=$(git ls-files --modified --others --exclude-standard docs/v1/*.json || true)
          if [ -n "$FILES" ]; then
            git add $FILES
            git commit -m "chore: Deploy JSON file to docs/v1 [skip ci]" || exit 0
            git pull --rebase --autostash
            git push origin HEAD
          else
            echo "No JSON changes in docs/v1 to commit."
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Scrape Data (v2 for ^5.0)
        if: matrix.scraper-version == '^5.0'
        run: php scraper_v2.php

      - name: Deploy JSON for scraper v2
        if: matrix.scraper-version == '^5.0'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          FILES=$(git ls-files --modified --others --exclude-standard docs/v2/*.json || true)
          if [ -n "$FILES" ]; then
            git add $FILES
            git commit -m "chore: Deploy JSON file to docs/v2 [skip ci]" || exit 0
            git pull --rebase --autostash
            git push origin HEAD
          else
            echo "No JSON changes in docs/v2 to commit."
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
